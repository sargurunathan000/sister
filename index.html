<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Sister 💖</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music -->
  <audio id="bgMusic" autoplay loop>
    <source src="Osaka-Osaka (mp3cut.net).mp3" type="audio/mp3">
  </audio>

  <!-- Background Photo -->
  <div class="bg"></div>

  <!-- Floating Hearts -->
  <div class="hearts"></div>

  <!-- Main Section -->
  <section class="main">

    <h1 class="title">
      Heyyyy Sister 💕
    </h1>

    <p class="line">
      “A non-blood sister with a real heart connection is rarer than gold ✨ <br>
      And you are my favorite person, my favorite sister forever 💖”
    </p>

    <div class="heart">💖</div>

    <h2 class="question">Are You My Sister? 😎</h2>

    <div class="buttons">
      <button id="yesBtn">YES 😍</button>
      <button id="noBtn">NO 😜</button>
    </div>

    <!-- Loosu Button -->
    <button id="loosuBtn">Loosu 🤪</button>

  </section>

  <!-- Gallery Section -->
  <section class="gallery" id="gallery">

    <h1 class="gallery-title">My Favorite Sister 💕</h1>

    <div class="slider">

      <div class="slide-track">

        <img src="https://i.postimg.cc/8cQkGY9K/Whats-App-Image-2026-05-23-at-10-04-37-PM-(1).jpg">
        <img src="https://i.postimg.cc/y6P2s5Mj/Whats-App-Image-2026-05-23-at-10-13-34-PM-(1).jpg">
        <img src="https://i.postimg.cc/J06TZw8d/Whats-App-Image-2026-05-23-at-10-13-34-PM.jpg">
        <img src="https://i.postimg.cc/mrsP3t85/Whats-App-Image-2026-05-23-at-10-04-37-PM.jpg">

        <!-- Duplicate -->
        <img src="https://i.postimg.cc/8cQkGY9K/Whats-App-Image-2026-05-23-at-10-04-37-PM-(1).jpg">
        <img src="https://i.postimg.cc/y6P2s5Mj/Whats-App-Image-2026-05-23-at-10-13-34-PM-(1).jpg">
        <img src="https://i.postimg.cc/J06TZw8d/Whats-App-Image-2026-05-23-at-10-13-34-PM.jpg">
        <img src="https://i.postimg.cc/mrsP3t85/Whats-App-Image-2026-05-23-at-10-04-37-PM.jpg">

      </div>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
